    *, *::before, *::after {

      padding: 0;
      box-sizing: border-box;

    body {

      color: #1a1a2e;

    .page-wrapper {

      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      padding-bottom: 140px;
    }

    /* ---- Hero Section ---- */
    .hero {
      background: linear-gradient(180deg, #e8e4f0 0%, #f0eef5 100%);
      padding: 48px 24px 32px;
      text-align: center;
    }

    .hero-title {
      font-size: 2.25rem;
      font-weight: 900;
      color: #1a1a2e;
      margin-bottom: 16px;
      letter-spacing: -0.5px;
    }

    .hero-subtitle {
      font-size: 1.125rem;
      color: #3a3a5c;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .badges {
      display: flex;
      justify-content: center;
      flex-wrap: nowrap;
      gap: 6px;
    }

    .badge {
      background: #3a3acd;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 600;
      padding: 7px 12px;
      border-radius: 20px;
      white-space: nowrap;
    }

    /* ---- How It Works ---- */
    .how-it-works {
      padding: 32px 20px 24px;
    }

    .section-indicator {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }

    .indicator-dot {
      width: 28px;
      height: 4px;
      border-radius: 2px;
      background: #d0d0e0;
    }

    .indicator-dot.active {
      background: #3b3b98;
    }

    .section-title {
      font-size: 1.5rem;
      font-weight: 800;
      color: #1a1a2e;
      margin-bottom: 20px;
    }

    .step-card {
      border-radius: 20px;
      padding: 24px 20px;
      margin-bottom: 16px;
    }

    .step-card-1 {
      background: linear-gradient(160deg, #e4873f 0%, #d07030 100%);
    }

    .step-card-2 {
      background: linear-gradient(160deg, #f0c23e 0%, #e4b42e 100%);
    }

    .step-card-3 {
      background: linear-gradient(160deg, #5b8def 0%, #4a6cf7 100%);
    }

    .step-card-4 {
      background: linear-gradient(160deg, #cf6858 0%, #c05848 100%);
    }

    .step-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .step-icon {
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .step-icon svg {
      width: 20px;
      height: 20px;
      fill: #fff;
    }

    .step-label {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .step-label span {
      font-weight: 400;
    }

    /* Step 1 items */
    .goal-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .goal-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .goal-bubble {
      background: rgba(255, 255, 255, 0.9);
      color: #3a3a5c;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: 12px;
      flex-shrink: 1;
    }

    .goal-icon-right {
      margin-left: auto;
      opacity: 0.7;
    }

    .goal-icon-right svg,
    .goal-icon-left svg {
      width: 24px;
      height: 24px;
      fill: #fff;
    }

    .goal-icon-left {
      opacity: 0.7;
      flex-shrink: 0;
    }

    .goal-row-offset {
      padding-left: 32px;
    }

    /* Step 2 items */
    .task-items {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.85);
      padding: 10px 16px;
      border-radius: 12px;
    }

    .task-check {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    .task-check svg {
      width: 20px;
      height: 20px;
    }

    .task-text {
      font-size: 0.875rem;
      font-weight: 500;
      color: #3a3a5c;
    }

    /* Step 3 items */
    .step3-content {
      text-align: center;
    }

    .step3-bubble {
      background: rgba(255, 255, 255, 0.85);
      color: #3a3a5c;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 10px 16px;
      border-radius: 12px;
      display: inline-block;
      margin-bottom: 20px;
    }

    .step3-icons {
      display: flex;
      justify-content: center;
      gap: 24px;
    }

    .step3-icons svg {
      width: 36px;
      height: 36px;
      fill: #fff;
      opacity: 0.85;
    }

    /* ---- Sticky Bottom Buttons ---- */
    .sticky-buttons {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 12px 36px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: linear-gradient(180deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.95) 20%, #fff 40%);
    }

    .sticky-buttons-inner {
      max-width: 420px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px 24px;
      border: none;
      border-radius: 30px;
      font-family: inherit;
      font-size: 1.0625rem;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .btn:active {
      transform: scale(0.97);
      opacity: 0.9;
    }

    .btn-waitlist {
      background: #3030a0;
      color: #fff;
    }

    .btn-whatsapp {
      background: #3cc860;
      color: #fff;
    }

    function detectLang() {
      const langs = navigator.languages || [navigator.language || 'en'];
      for (const l of langs) {
        const code = l.toLowerCase().split('-')[0];
        if (translations[code]) return code;
      }
      return 'en';
    }

    function applyTranslations(lang) {
      const t = translations[lang] || translations['en'];
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) {
          el.innerHTML = t[key];
        }
      });
    }

    applyTranslations(detectLang());
  </script>
